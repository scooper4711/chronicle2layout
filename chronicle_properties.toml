# Layout Generator Metadata — PFS2 Chronicle Properties
#
# Run against the chronicle PDFs under:
#   modules/pfs-chronicle-generator/assets/chronicles/
#
# Rules are tested in order; the first matching pattern wins.
# Templates support regex capture group substitution: $0 (full match),
# $1, $2, etc.  Use ${~N} to CamelCase-split group N into words.
#
# All season patterns are anchored to pfs2/ to avoid matching SFS
# chronicles that use the same N-XX-Name format.

layouts_dir = "modules/pfs-chronicle-generator/assets/layouts"

# =========================================================================
# Bounties
# =========================================================================
# B1–B12 use bounty-layout-b1, B13+ use bounty-layout-b13.

[[rules]]
pattern = 'pfs2/bounties/B(1[0-2]|[1-9])-(\S+)Chronicle\.pdf$'
id = "pfs2.b$1"
parent = "pfs2.bounty-layout-b1"
description = "B$1 ${~2}"
default_chronicle_location = "modules/pfs-chronicle-generator/assets/chronicles/pfs2/bounties/B$1-$2Chronicle.pdf"

[[rules]]
pattern = 'pfs2/bounties/B(\d+)-(\S+)Chronicle\.pdf$'
id = "pfs2.b$1"
parent = "pfs2.bounty-layout-b13"
description = "B$1 ${~2}"
default_chronicle_location = "modules/pfs-chronicle-generator/assets/chronicles/pfs2/bounties/B$1-$2Chronicle.pdf"

